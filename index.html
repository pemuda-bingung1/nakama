.content-wrapper {

  .card-flipper {
    position: relative;
    transition: transform 0.8s;
    transform-style: preserve-3d;
  }

  .card-flipper.is-flipped {
    transform: rotateY(180deg);
  }

  .card-face-front {
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
  }

  .card-face-back {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    transform: rotateY(180deg);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
    box-sizing: border-box;
    background: linear-gradient(270deg, #000080 0%, #ffd700 21%, #8A2BE2 33%, #FF1493 44%, #4B0082 60%, #DA70D6 73%, #FFD700 85%, #191970 100%);
    padding: 12px;
    display: block;
  }

  .card-face-back amp-img {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 10px;
  }

  .ygo-card-container {
    width: 100%;
    padding: 14px;
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    box-sizing: border-box;

    background:
        radial-gradient(circle at top left,
        rgba(0, 255, 170, 0.25) 0%,
        transparent 40%),
        linear-gradient(
        135deg,
        #111111 0%,
        #1a1a1a 35%,
        #252525 70%,
        #111111 100%
    );
    animation: goldPulse 2s infinite;
    border: 1px solid rgba(0, 255, 149, 0.35);

    box-shadow:
        0 10px 30px rgba(0,0,0,.4),
        inset 0 1px 1px rgba(255,255,255,.08);
}

/* Glow emas di sudut */
.ygo-card-container::after {
    content: '';
    position: absolute;
    top: -80px;
    right: -80px;
    width: 180px;
    height: 180px;
    background: radial-gradient(
        circle,
        rgba(174, 0, 255, 0.35),
        transparent 70%
    );
    pointer-events: none;
}

/* Shine effect */
.ygo-card-container::before {
    content: '';
    position: absolute;
    top: 0;
    left: -150%;
    width: 50%;
    height: 100%;

    background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.25),
        transparent
    );

    transform: skewX(-25deg);
    animation: shine 5s infinite;
}

@keyframes shine {
    0% {
        left: -150%;
    }
    30% {
        left: 150%;
    }
    100% {
        left: 150%;
    }
}

  @keyframes card-shine {
    0% {
      left: -150px;
    }

    25% {
      left: 110%;
    }

    100% {
      left: 110%;
    }
  }

    }
  }

@keyframes goldPulse {

  }

  .star::before {

    left: 0;

@keyframes ratingPulse {

  .card-image-box {
  padding: 8px;

}

/* efek shine jalan */
.card-image-box::before {
  content: "";
  position: absolute;
  top: -50%;

  width: 200%;
  height: 200%;

  );

/* animasi */

.card-cta-button {
    display: block;
    width: 80%;
    margin: 15px auto 10px auto;
    padding: 12px;
    /* Background diperlebar untuk animasi flow */

    background-size: 400% 400%;
    color: #fff;
    font-family: 'Matrix Regular Small Caps', sans-serif;
    font-size: 20px; /* Sedikit diperbesar */
    font-weight: bold;
    text-align: center;
    text-decoration: none;
    border-radius: 8px;
    box-shadow: 0 0 15px rgba(215, 183, 0, 0.4);
    cursor: pointer;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    position: relative;
    overflow: hidden;
    /* Animasi background mengalir */
    animation: goldFlow 3s infinite linear, buttonPulse 2s infinite;
    transition: all 0.3s ease;
}

/* Animasi mengalirkan warna emas dan cahaya putih */
@keyframes goldFlow {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

/* Animasi denyut halus agar tombol terlihat "hidup" */
@keyframes buttonPulse {
    0% { transform: scale(1); box-shadow: 0 0 10px rgba(215, 183, 0, 0.4); }
    50% { transform: scale(1.03); box-shadow: 0 0 25px rgba(215, 183, 0, 0.7); }
    100% { transform: scale(1); box-shadow: 0 0 10px rgba(215, 183, 0, 0.4); }
}

.splash-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-color: #111111; /* Warna background gelap */
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 99999; /* Memastikan berada di paling depan */
  
  /* Menjalankan animasi: nama_animasi | durasi | delay | tipe_transisi | status_akhir */
  animation: fadeOutSplash 0.5s ease-in-out 0.8s forwards;
  pointer-events: none; /* Biar user bisa klik menu di bawahnya setelah hilang */
}

/* Ukuran Logo */
.splash-logo {
  max-width: 150px; /* Atur lebar maksimal logo kamu */
  height: auto;
  /* Animasi opsional: membuat logo sedikit membesar saat muncul */
  animation: scaleUp 0.5s ease-out;
}

/* KEYFRAMES ANIMASI */

/* 1. Animasi Menghilang (Fade Out) untuk Background */
@keyframes fadeOutSplash {
  0% {
    opacity: 1;
    visibility: visible;
  }
  99% {
    opacity: 0;
    visibility: visible;
  }
  100% {
    opacity: 0;
    visibility: hidden; /* Benar-benar hilang dari layar */
    display: none;
  }
}

/* 2. Animasi Logo Efek Pop-up Ringan */
@keyframes scaleUp {
  0% {
    transform: scale(0.8);
    opacity: 0;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}
